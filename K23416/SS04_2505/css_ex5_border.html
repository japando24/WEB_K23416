<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>CSS Ex5 - Border Radius</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    .rectangle {
      width: 150px;
      height: 280px;
      background-color: #4CAF50;
      border-radius: 0 60px 0 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="rectangle">Nokia</div>
</body>
</html>
