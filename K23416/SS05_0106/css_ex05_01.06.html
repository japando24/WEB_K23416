<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            position: relative;
            min-height: 100vh;
        }

        .bg{
            background-color: white;
        }

        /* Desktop mặc định: dưới trái */
        /* Luôn dùng top + left để transition smooth, không đổi property */
        .btn-contact {
            position: absolute;
            top: calc(100% - 70px);   /* = bottom: 40px */
            left: 40px;
            transform: translateX(0);
            background-color: #e63946;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(230, 57, 70, 0.35);
            text-decoration: none;
            display: inline-block;
            transition:
                top    0.6s cubic-bezier(0.4, 0, 0.2, 1),
                left   0.6s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                padding   0.4s ease,
                background-color 0.2s;
        }

        .btn-contact:hover {
            background-color: #c1121f;
            transform: translateX(0) translateY(-4px);
        }

        /*Destop*/
        @media screen and (max-width: 1000px) {
            .bg{
                background-color: darkgreen;
            }
        }

        /* Tablet: trên phải */
        /* left: calc(100% - 138px) = cách phải ~18px với button ~120px */
        @media screen and (max-width: 650px) {
            .bg{
                background-color: rgb(100, 0, 93);
            }

            .btn-contact {
                top: 18px;
                left: calc(100% - 138px);
                transform: translateX(0);
                padding: 10px 20px;
                border-radius: 6px;
            }

            .btn-contact:hover {
                transform: translateX(0) translateY(-4px);
            }
        }

        /* Mobile: chính giữa */
        @media screen and (max-width: 600px) {
            .bg{
                background-color: rgb(92, 100, 0);
            }

            .btn-contact {
                top: 18px;
                left: 50%;
                transform: translateX(-50%);
                padding: 8px 16px;
                border-radius: 5px;
            }

            .btn-contact:hover {
                transform: translateX(-50%) translateY(-4px);
            }
        }

    </style>
</head>
<body class="bg">
    <div>
        <a href="#" class="btn-contact">Liên hệ</a>
    </div>
</body>
</html>
