<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            color: rgb(243, 243, 243);

        }

        .box1 {
            width: 100vw;
            height: 150px;
            position: relative;
            background-color: rgba(0, 100, 0, 0.533);
            z-index: 999;

        }

        .box2 {
            background-color: rgba(255, 140, 0, 0.559);
            width: 60vw;
            height: 100px;
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 3;
        }

        .box3{
            width: 80vw;
            height: 100px;
            background-color: rgba(139, 0, 139, 0.49);
            position: absolute;
            top: 60px;
            left: 50px;
            z-index: 2;      
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Z-index: 1</div>
        <div class="box2">Z-index: 2</div>
        <div class="box3">Z-index: 3</div>
    </div>
</body>
</html>
