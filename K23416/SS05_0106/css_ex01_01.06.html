<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"> </head>
    <style>
        .header {
            background-color: darkgreen;
            color: white;
            padding: 15px;
            text-align: center;
            margin: 5px;
        }

        .carousel-item img {
            object-fit: cover;
            width: 100%;
            height: 70vh;
            max-height: 600px;
        }
    </style>
    <body>
        <div class="container py-3">
            <div class="bg-primary text-white text-center p-3 mb-3">
                My Website
            </div>
            <div class="mb-3">
                <input type="button" value="Submit" class="btn btn-primary me-2">
                <button class="btn btn-danger me-2">Reset</button>
                <button class="btn btn-outline-primary">OKE</button>
            </div>

            <!-- Carousel -->
            <div id="demo" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators/dots -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
        </div>
        
        <!-- The slideshow/carousel -->
        <div class="carousel-inner">
            <div class="carousel-item active">
            <img src="Cherry-Blossoms-Japan-AVG-Travels-scaled.jpg" alt="Los Angeles" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
            <img src="Chureito-Pagoda-Sakura-Lake-Kawaguchiko-Japan.jpeg" alt="Chicago" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
            <img src="inception-nijo-castle-kyoto-japan-121575-2.jpg" alt="New York" class="d-block" style="width:100%">
            </div>
        </div>
        
        <!-- Left and right controls/icons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
        <div>
            <i class="bi bi-twitter h1 text-primary"></i>
            <i class="bi bi-heart fs-2 text-danger"></i>
            <i class="bi bi-clock h1 text-secondary"></i>
            </i>
        </div>
        </div>

    </body>
</html>
