<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop – Danh sách sản phẩm</title>
  <link rel="stylesheet" href="../../../BootstrapCSS/fontawesome/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    img { max-width: 100%; display: block; }
    a   { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ── NAVBAR ── */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .navbar-logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: #222;
      white-space: nowrap;
    }

    .navbar-nav { display: flex; gap: 4px; }

    .nav-link {
      padding: 6px 14px;
      border-radius: 4px;
      color: #555;
      font-size: 14px;
      font-weight: 500;
      transition: background .18s, color .18s;
    }

    .nav-link:hover, .nav-link.active { background: #f0f0f0; color: #111; }

    .search-group {
      margin-left: auto;
      display: flex;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }

    .search-input {
      padding: 7px 12px;
      border: none;
      outline: none;
      font-size: 13px;
      width: 200px;
      color: #333;
    }

    .search-btn {
      padding: 7px 14px;
      background: #ffc200;
      color: #111;
      border: none;
      font-size: 13px;
      font-weight: 700;
      transition: background .18s;
    }

    .search-btn:hover { background: #e6ae00; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
    }

    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: #333;
      border-radius: 2px;
    }

    /* ── HERO SLIDER ── */
    .hero-section {
      max-width: 1100px;
      margin: 26px auto 0;
      padding: 0 16px;
    }

    .hero-main {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      background: #ddd;
    }

    .hero-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .4s ease;
    }

    /* Fade giữa các slide */
    .hero-main img.fade-out { opacity: 0; }

    .slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.42);
      color: white;
      border: none;
      font-size: 1.2rem;
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s;
      z-index: 2;
    }

    .slide-btn:hover { background: rgba(0,0,0,.65); }
    .slide-btn.prev { left: 14px; }
    .slide-btn.next { right: 14px; }

    /* Dots indicator */
    .slide-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 2;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,.55);
      border: none;
      padding: 0;
      transition: background .2s, transform .2s;
    }

    .dot.active { background: white; transform: scale(1.25); }

    /* Thumbnails */
    .hero-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumb {
      flex: 1;
      height: 72px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      opacity: .58;
      border: 2px solid transparent;
      transition: opacity .2s, border-color .2s;
    }

    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .thumb.active {
      opacity: 1;
      border-color: #ffc200;
    }

    /* ── PRODUCT SECTION ── */
    .product-section {
      max-width: 1100px;
      margin: 32px auto 40px;
      padding: 0 16px;
    }

    .section-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-hd h2 { font-size: 1.3rem; font-weight: 700; color: #111; }

    .product-count { font-size: 13px; color: #888; }

    /* States */
    .loading-state,
    .error-state,
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 15px;
    }

    .loading-state i { font-size: 2rem; margin-bottom: 12px; display: block; }
    .error-state  i { font-size: 2rem; margin-bottom: 12px; display: block; color: #e74c3c; }
    .empty-state  i { font-size: 2rem; margin-bottom: 12px; display: block; }

    /* Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    /* Card */
    .product-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      cursor: pointer;
      transition: box-shadow .2s, transform .2s;
    }

    .product-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,.13);
      transform: translateY(-3px);
    }

    .card-img-wrap {
      position: relative;
      height: 190px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-img-wrap img {
      max-height: 160px;
      max-width: 86%;
      object-fit: contain;
      transition: transform .3s;
    }

    .product-card:hover .card-img-wrap img { transform: scale(1.06); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .22s;
    }

    .product-card:hover .card-overlay { opacity: 1; }
    .card-overlay i { color: white; font-size: 1.7rem; }

    .badge-discount {
      position: absolute;
      top: 8px; left: 8px;
      background: #e74c3c;
      color: white;
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .btn-wishlist {
      position: absolute;
      top: 7px; right: 8px;
      background: none;
      border: none;
      font-size: 17px;
      color: #ccc;
      transition: color .18s, transform .18s;
      padding: 2px;
      line-height: 1;
    }

    .btn-wishlist:hover { color: #e74c3c; transform: scale(1.2); }
    .btn-wishlist.liked { color: #e74c3c; }

    /* Card body */
    .card-body { padding: 11px 13px; }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #222;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 36px;
    }

    .card-price {
      font-size: .95rem;
      font-weight: 700;
      color: #e74c3c;
      margin-bottom: 5px;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #888;
      margin-bottom: 9px;
    }

    .rating { color: #f39c12; display: flex; align-items: center; gap: 2px; }
    .rating .score { color: #888; margin-left: 3px; font-size: 10.5px; }

    .btn-buy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 12.5px;
      font-weight: 700;
      transition: background .18s;
    }

    .btn-buy:hover { background: #1a252f; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.56);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.show { display: flex; }

    .modal-box {
      background: white;
      border-radius: 12px;
      max-width: 700px;
      width: 100%;
      display: flex;
      gap: 24px;
      padding: 28px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      animation: popIn .2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      font-size: 17px;
      color: #aaa;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color .18s, background .18s;
    }

    .modal-close:hover { color: #333; background: #f0f0f0; }

    .modal-img {
      width: 220px;
      min-width: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 10px;
    }

    .modal-img img { max-height: 220px; object-fit: contain; }

    .modal-info { flex: 1; }

    .modal-title { font-size: 1.15rem; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
    .modal-price { font-size: 1.1rem; font-weight: 700; color: #e74c3c; margin-bottom: 5px; }

    .modal-category {
      display: inline-block;
      background: #f0f0f0;
      color: #555;
      font-size: 11.5px;
      padding: 2px 10px;
      border-radius: 3px;
      margin-bottom: 12px;
      text-transform: capitalize;
    }

    .modal-desc { font-size: 13px; color: #555; line-height: 1.65; margin-bottom: 18px; }

    .modal-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .modal-rating .stars { color: #f39c12; }

    .modal-actions { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }

    .qty-input {
      width: 62px;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
      outline: none;
    }

    .qty-input:focus { border-color: #2c3e50; }

    .btn-add-cart {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 20px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 700;
      transition: background .18s;
    }

    .btn-add-cart:hover { background: #1a252f; }

    .btn-close-modal {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: white;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: background .18s;
    }

    .btn-close-modal:hover { background: #f5f5f5; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .navbar-nav {
        display: none;
        position: absolute;
        top: 56px;
        left: 0; right: 0;
        background: white;
        flex-direction: column;
        padding: 12px;
        border-top: 1px solid #eee;
        box-shadow: 0 4px 10px rgba(0,0,0,.1);
        z-index: 199;
      }

      .navbar-nav.open { display: flex; }

      .search-input { width: 120px; }
      .search-group { margin-left: 0; }

      .hero-main { height: 260px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 500px) {
      .products-grid { grid-template-columns: 1fr; }
      .modal-box { flex-direction: column; }
      .modal-img { width: 100%; min-width: unset; height: 180px; }
      .hero-main { height: 200px; }
      .hero-thumbs { display: none; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-inner">

    <a href="#" class="navbar-logo">MyShop</a>

    <nav class="navbar-nav" id="main-nav">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Shop</a>
      <a href="#" class="nav-link">About</a>
    </nav>

    <div class="search-group">
      <input type="text" class="search-input" id="search-input"
             placeholder="Search..."
             oninput="searchProducts(this.value)"
             onkeydown="if(event.key==='Enter') searchProducts(this.value)">
      <button class="search-btn" onclick="searchProducts(document.getElementById('search-input').value)">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>

    <button class="hamburger" onclick="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>


<!-- HERO SLIDER -->
<section class="hero-section">

  <div class="hero-main" id="hero-main">
    <img id="hero-img" src="" alt="Banner" loading="eager">

    <button class="slide-btn prev" onclick="prevSlide()">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="slide-btn next" onclick="nextSlide()">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="slide-dots" id="slide-dots"></div>
  </div>

  <div class="hero-thumbs" id="hero-thumbs"></div>

</section>


<!-- PRODUCT SECTION -->
<section class="product-section">

  <div class="section-hd">
    <h2>Sản phẩm nổi bật</h2>
    <span class="product-count" id="product-count"></span>
  </div>

  <div id="product-area">
    <div class="loading-state">
      <i class="fa-solid fa-spinner fa-spin"></i>
      Đang tải sản phẩm từ API...
    </div>
  </div>

</section>


<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModalOnBackdrop(event)">
  <div class="modal-box">

    <button class="modal-close" onclick="closeModal()">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="modal-img">
      <img id="modal-img" src="" alt="">
    </div>

    <div class="modal-info">
      <div class="modal-title"    id="modal-title"></div>
      <div class="modal-price"    id="modal-price"></div>
      <div class="modal-category" id="modal-category"></div>
      <div class="modal-rating"   id="modal-rating"></div>
      <div class="modal-desc"     id="modal-desc"></div>

      <div class="modal-actions">
        <input class="qty-input" type="number" id="modal-qty" value="1" min="1">

        <button class="btn-add-cart" onclick="addToCart()">
          <i class="fa-solid fa-cart-plus"></i> Add to cart
        </button>

        <button class="btn-close-modal" onclick="closeModal()">
          <i class="fa-solid fa-xmark"></i> Close
        </button>
      </div>
    </div>

  </div>
</div>


<script>
  /* ============================================================
     HERO SLIDER
  ============================================================ */
  var slides = [
    {
      url: 'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&h=500&fit=crop',
      alt: 'Shopping lifestyle 1'
    },
    {
      url: 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200&h=500&fit=crop',
      alt: 'Shopping lifestyle 2'
    },
    {
      url: 'https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=1200&h=500&fit=crop',
      alt: 'Shopping lifestyle 3'
    }
  ];

  var currentSlide = 0;
  var sliderTimer  = null;

  function initSlider() {
    var dotsEl   = document.getElementById('slide-dots');
    var thumbsEl = document.getElementById('hero-thumbs');

    slides.forEach(function(s, i) {
      // Dots
      var dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = function() { goToSlide(i); };
      dotsEl.appendChild(dot);

      // Thumbnails
      var thumb = document.createElement('div');
      thumb.className = 'thumb' + (i === 0 ? ' active' : '');
      thumb.innerHTML = '<img src="' + s.url + '" alt="' + s.alt + '" loading="lazy">';
      thumb.onclick = function() { goToSlide(i); };
      thumbsEl.appendChild(thumb);
    });

    setSlide(0);
    startAutoPlay();
  }

  function setSlide(index) {
    currentSlide = index;
    var img = document.getElementById('hero-img');
    img.src = slides[index].url;
    img.alt = slides[index].alt;

    document.querySelectorAll('.dot').forEach(function(d, i) {
      d.classList.toggle('active', i === index);
    });
    document.querySelectorAll('.thumb').forEach(function(t, i) {
      t.classList.toggle('active', i === index);
    });
  }

  function nextSlide() {
    goToSlide((currentSlide + 1) % slides.length);
  }

  function prevSlide() {
    goToSlide((currentSlide - 1 + slides.length) % slides.length);
  }

  function goToSlide(index) {
    setSlide(index);
    stopAutoPlay();
    startAutoPlay();
  }

  function startAutoPlay() {
    sliderTimer = setInterval(function() { nextSlide(); }, 3000);
  }

  function stopAutoPlay() {
    if (sliderTimer) clearInterval(sliderTimer);
  }


  /* ============================================================
     PRODUCTS – Fetch từ fakestoreapi.com
  ============================================================ */
  var allProducts = [];
  var API_URL = 'https://fakestoreapi.com/products';

  function loadProducts() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API_URL, true);

    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200) {
        try {
          allProducts = JSON.parse(xhr.responseText);
          renderProducts(allProducts);
        } catch (e) {
          showError('Không thể đọc dữ liệu từ API.');
        }
      } else {
        showError('Không thể kết nối API (status ' + xhr.status + ').');
      }
    };

    xhr.onerror = function() {
      showError('Lỗi mạng – vui lòng kiểm tra kết nối internet.');
    };

    xhr.send();
  }

  function showError(msg) {
    document.getElementById('product-area').innerHTML =
      '<div class="error-state">' +
        '<i class="fa-solid fa-circle-exclamation"></i>' +
        msg +
      '</div>';
    document.getElementById('product-count').textContent = '';
  }

  function renderProducts(products) {
    var area = document.getElementById('product-area');
    var countEl = document.getElementById('product-count');

    if (products.length === 0) {
      area.innerHTML =
        '<div class="empty-state">' +
          '<i class="fa-solid fa-box-open"></i>' +
          'Không tìm thấy sản phẩm nào.' +
        '</div>';
      countEl.textContent = '';
      return;
    }

    countEl.textContent = products.length + ' sản phẩm';

    var html = '<div class="products-grid">';

    for (var i = 0; i < products.length; i++) {
      var p = products[i];
      var discount = 10 + (p.id % 20);

      // Star icons
      var stars = '';
      var full = Math.round(p.rating.rate);
      for (var s = 1; s <= 5; s++) {
        stars += s <= full
          ? '<i class="fa-solid fa-star"></i>'
          : '<i class="fa-regular fa-star"></i>';
      }

      html += '<div class="product-card" onclick="openModal(' + i + ')">';

      html +=   '<div class="card-img-wrap">';
      html +=     '<img src="' + p.image + '" alt="' + escHtml(p.title) + '" loading="lazy">';
      html +=     '<div class="card-overlay"><i class="fa-solid fa-eye"></i></div>';
      html +=     '<span class="badge-discount">-' + discount + '%</span>';
      html +=     '<button class="btn-wishlist" id="wish-' + i + '" ' +
                    'onclick="event.stopPropagation(); toggleWishlist(' + i + ')">' +
                    '<i class="fa-regular fa-heart"></i></button>';
      html +=   '</div>';

      html +=   '<div class="card-body">';
      html +=     '<div class="card-name">' + escHtml(p.title) + '</div>';
      html +=     '<div class="card-price">$' + p.price.toFixed(2) + '</div>';
      html +=     '<div class="card-meta">';
      html +=       '<span class="rating">' + stars +
                      '<span class="score">' + p.rating.rate.toFixed(1) + '</span></span>';
      html +=       '<span>' + p.rating.count + ' đánh giá</span>';
      html +=     '</div>';
      html +=     '<button class="btn-buy" onclick="event.stopPropagation(); openModal(' + i + ')">' +
                    '<i class="fa-solid fa-cart-shopping"></i> Buy Now</button>';
      html +=   '</div>';

      html += '</div>';
    }

    html += '</div>';
    area.innerHTML = html;
  }

  // Escape HTML để tránh XSS khi inject tên sản phẩm
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }


  /* ============================================================
     MODAL
  ============================================================ */
  function openModal(index) {
    var current = getCurrentProducts();
    var p = current[index];
    if (!p) return;

    var full = Math.round(p.rating.rate);
    var stars = '';
    for (var s = 1; s <= 5; s++) {
      stars += s <= full
        ? '<i class="fa-solid fa-star"></i>'
        : '<i class="fa-regular fa-star"></i>';
    }

    document.getElementById('modal-img').src       = p.image;
    document.getElementById('modal-img').alt       = p.title;
    document.getElementById('modal-title').textContent    = p.title;
    document.getElementById('modal-price').textContent    = '$' + p.price.toFixed(2);
    document.getElementById('modal-category').textContent = p.category;
    document.getElementById('modal-desc').textContent     = p.description;
    document.getElementById('modal-rating').innerHTML =
      '<span class="stars">' + stars + '</span> ' +
      p.rating.rate.toFixed(1) + ' / 5 &nbsp;·&nbsp; ' + p.rating.count + ' đánh giá';
    document.getElementById('modal-qty').value = 1;

    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
  }

  function closeModalOnBackdrop(event) {
    if (event.target === document.getElementById('modal')) closeModal();
  }

  function addToCart() {
    var title = document.getElementById('modal-title').textContent;
    var qty   = document.getElementById('modal-qty').value;
    alert('Đã thêm ' + qty + ' × "' + title + '" vào giỏ hàng!');
    closeModal();
  }


  /* ============================================================
     SEARCH (debounce 300ms)
  ============================================================ */
  var searchTimer = null;

  function searchProducts(keyword) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      var kw = keyword.toLowerCase().trim();
      var result = kw === ''
        ? allProducts
        : allProducts.filter(function(p) {
            return p.title.toLowerCase().indexOf(kw) !== -1;
          });
      renderProducts(result);
    }, 300);
  }

  function getCurrentProducts() {
    var kw = document.getElementById('search-input').value.toLowerCase().trim();
    if (kw === '') return allProducts;
    return allProducts.filter(function(p) {
      return p.title.toLowerCase().indexOf(kw) !== -1;
    });
  }


  /* ============================================================
     WISHLIST
  ============================================================ */
  function toggleWishlist(index) {
    var btn  = document.getElementById('wish-' + index);
    var icon = btn.querySelector('i');
    if (btn.classList.contains('liked')) {
      btn.classList.remove('liked');
      icon.className = 'fa-regular fa-heart';
    } else {
      btn.classList.add('liked');
      icon.className = 'fa-solid fa-heart';
    }
  }


  /* ============================================================
     NAVBAR MOBILE
  ============================================================ */
  function toggleMenu() {
    document.getElementById('main-nav').classList.toggle('open');
  }


  /* ============================================================
     ESC → đóng modal
  ============================================================ */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });


  /* ============================================================
     KHỞI ĐỘNG
  ============================================================ */
  window.onload = function() {
    initSlider();
    loadProducts();
  };
</script>

</body>
</html>
