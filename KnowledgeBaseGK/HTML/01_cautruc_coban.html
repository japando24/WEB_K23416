<!DOCTYPE html>
<!-- 
  !DOCTYPE html: Khai báo đây là tài liệu HTML5
  Bắt buộc phải có ở dòng đầu tiên
-->

<html lang="vi">
<!-- 
  <html>: Thẻ gốc bao toàn bộ trang HTML
  lang="vi": Khai báo ngôn ngữ trang là tiếng Việt
-->

<head>
  <!-- 
    <head>: Phần đầu trang - KHÔNG hiển thị trên trình duyệt
    Chứa các thông tin meta, title, link CSS, script...
  -->

  <meta charset="UTF-8">
  <!-- 
    <meta charset="UTF-8">: Khai báo bộ mã ký tự
    UTF-8 hỗ trợ tiếng Việt và hầu hết ngôn ngữ trên thế giới
    Thiếu dòng này → tiếng Việt sẽ bị lỗi font (hiện ký tự lạ)
  -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 
    Giúp trang web hiển thị đúng trên thiết bị di động (responsive)
  -->

  <title>Tiêu đề trang web</title>
  <!-- 
    <title>: Tiêu đề hiển thị trên tab trình duyệt
    Cũng là tiêu đề khi bookmark hoặc chia sẻ link
  -->

</head>

<body>
  <!-- 
    <body>: Phần nội dung trang - TẤT CẢ những gì hiển thị trên màn hình
    Toàn bộ các thẻ HTML nội dung đều nằm trong <body>
  -->

  <h1>Đây là nội dung chính của trang Web</h1>
  <p>Mọi thứ bạn viết ở đây sẽ hiển thị trên trình duyệt.</p>

  <!-- Ghi chú trong HTML: dùng cú pháp này, trình duyệt sẽ BỎ QUA -->
  <!-- Ghi chú KHÔNG hiển thị trên trang, chỉ nhìn thấy trong source code -->

</body>

</html>
<!-- 
  Tóm tắt cấu trúc:
  
  <!DOCTYPE html>
  <html>
      <head>
          <meta charset="UTF-8">
          <title> ... </title>
      </head>
      <body>
          ... nội dung hiển thị ...
      </body>
  </html>
-->
