<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-wrapper">
    <form class="registration-form">
      <h2 class="form-title">Class Registration</h2>
      <p class="form-subtitle">Fill out the form carefully for registration</p>
      <hr class="divider">

      <div class="form-group">
        <label class="field-label" for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="" disabled selected>Please Select</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="field-label">Student Name</label>
        <div class="name-row">
          <div class="name-field">
            <input type="text" name="first-name" placeholder="">
            <span class="sub-label">First Name</span>
          </div>
          <div class="name-field">
            <input type="text" name="middle-name" placeholder="">
            <span class="sub-label">Middle Name</span>
          </div>
          <div class="name-field">
            <input type="text" name="last-name" placeholder="">
            <span class="sub-label">Last Name</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label" for="email">Student E-mail</label>
        <input type="email" id="email" name="email" placeholder="ex: myname@example.com">
        <span class="hint-text">example@example.com</span>
      </div>

      <div class="form-group">
        <label class="field-label" for="student-id">Student ID</label>
        <input type="text" id="student-id" name="student-id">
      </div>

      <div class="form-group">
        <label class="field-label" for="classes">List of Classes</label>
        <select id="classes" name="classes">
          <option value="" disabled selected>Please Select</option>
          <option value="math">Mathematics</option>
          <option value="science">Science</option>
          <option value="english">English</option>
        </select>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn-submit">Register Class</button>
      </div>
    </form>
  </div>
</body>
</html>
