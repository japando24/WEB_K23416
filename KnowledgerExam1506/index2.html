<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Vietnam Company Tour Agenda</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body class="tour-wrapper">
    <!-- Header Block -->
    <div class="tour-header">
        <img src="logo.png" alt="SAP Logo" class="header-logo">
        <h1>SAP VIETNAM TOUR AGENDA</h1>
        <div class="sub-badge">Khám phá. Học hỏi. Kết nối.</div>
    </div>

    <!-- Timeline Block -->
    <div class="tour-timeline">
        <div class="timeline-line"></div>

        <div class="timeline-item">
            <div class="item-time">
                <h2>14:00</h2>
                <p>10 phút</p>
            </div>
            <div class="item-node">
                <img src="icon-arrival.svg" alt="Arrival Icon" />
            </div>
            <div class="item-card">
                <h3>ARRIVAL & CHECK-IN</h3>
                <p>Check-in and prepare for your SAP Vietnam adventure!</p>
            </div>
        </div>

        <!-- Repeat the above structure for each timeline item -->
    </div>

    <!-- Footer Block -->
    <div class="tour-footer">
        <div class="footer-col" style="background-color: #f5f5f5;">
            <img src="icon-time.svg" alt="Time Icon" style="width: 32px;" />
            <h4>THỜI GIAN</h4>
            <p>14:00 - 17:10 (19/06/2026)</p>
        </div>

        <div class="footer-col" style="background-color: #e6f7f4;">
            <img src="icon-location.svg" alt="Location Icon" style="width: 32px;" />
            <h4>ĐỊA ĐIỂM</h4>
            <p>Văn phòng SAP Vietnam</p>
        </div>

        <div class="footer-col" style="background-color: #f3eaf9;">
            <img src="icon-person.svg" alt="Person Icon" style="width: 32px;" />
            <h4>HẸN GẶP BẠN!</h4>
            <p>Cùng kiến tạo tương lai cùng SAP.</p>
        </div>
    </div>
</body>
</html>
