<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form class="login-form">
    <table class="form-table">

      <tr>
        <td>
          <h1 class="logo">facebook</h1>
        </td>
      </tr>

      <tr>
        <td>
          <p class="tagline">Facebook helps you connect and share with the people in your life.</p>
        </td>
      </tr>

      <tr>
        <td>
          <input type="text" placeholder="Email address or phone number">
        </td>
      </tr>

      <tr>
        <td>
          <input type="password" placeholder="Password">
        </td>
      </tr>

      <tr>
        <td>
          <button type="submit" class="btn-login">Log In</button>
        </td>
      </tr>

      <tr>
        <td>
          <a href="#" class="forgot-link">Forgotten password?</a>
        </td>
      </tr>

      <tr>
        <td>
          <hr class="divider">
        </td>
      </tr>

      <tr>
        <td class="btn-create-cell">
          <button type="button" class="btn-create">Create New Account</button>
        </td>
      </tr>

    </table>
  </form>
</body>
</html>
