<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="registration-form">
        <table class="form-table">

            <tr>
                <td colspan="3">
                    <h2 class="form-title">Class Registration</h2>
                    <p class="form-subtitle">Fill out the form carefully for registration</p>
                    <hr class="divider">
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <label class="field-label" for="gender">Gender</label>
                    <select id="gender" name="gender">
                        <option value="" disabled selected>Please Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <label class="field-label">Student Name</label>
                    <table class="name-table">
                        <tr>
                            <td>
                                <input type="text" name="first-name" class="name-input">
                                <span class="sub-label">First Name</span>
                            </td>
                            <td>
                                <input type="text" name="middle-name" class="name-input">
                                <span class="sub-label">Middle Name</span>
                            </td>
                            <td>
                                <input type="text" name="last-name" class="name-input">
                                <span class="sub-label">Last Name</span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <label class="field-label" for="email">Student E-mail</label><br>
                    <input type="email" id="email" name="email" placeholder="ex: myname@example.com">
                    <span class="hint-text">example@example.com</span>
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <label class="field-label" for="student-id">Student ID</label><br>
                    <input type="text" id="student-id" name="student-id">
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <label class="field-label" for="classes">List of Classes</label>
                    <select id="classes" name="classes">
                        <option value="" disabled selected>Please Select</option>
                        <option value="math">Mathematics</option>
                        <option value="science">Science</option>
                        <option value="english">English</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="3" class="btn-cell">
                    <button type="submit" class="btn-submit">Register Class</button>
                </td>
            </tr>

        </table>
    </form>
</body>
</html>
