<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Tài khoản Google</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form class="register-form">
    <table class="form-table">

      <tr>
        <td colspan="2">
          <p class="google-logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue2">g</span><span class="g-green">l</span><span class="g-red2">e</span>
          </p>
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <h2 class="form-title">Tạo Tài khoản Google</h2>
          <p class="form-subtitle">Tiếp tục tới Gmail</p>
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <input type="text" placeholder="Họ">
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <input type="text" placeholder="Tên">
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <table class="username-table">
            <tr>
              <td>
                <input type="text" placeholder="Tên người dùng" class="username-input">
              </td>
              <td class="gmail-suffix-cell">
                <span class="gmail-suffix">@gmail.com</span>
              </td>
            </tr>
          </table>
          <p class="hint-text">Bạn có thể sử dụng chữ cái, số và dấu chấm</p>
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <input type="password" placeholder="Mật khẩu">
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <input type="password" placeholder="Xác nhận">
          <p class="hint-text">Sử dụng 8 ký tự trở lên và kết hợp chữ cái, chữ số và biểu tượng</p>
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <label class="show-pass-label">
            <input type="checkbox" name="show-password">
            Hiện mật khẩu
          </label>
        </td>
      </tr>

      <tr>
        <td class="footer-left">
          <a href="#" class="link-login">Đăng nhập</a>
        </td>
        <td class="footer-right">
          <button type="submit" class="btn-next">Tiếp theo</button>
        </td>
      </tr>

    </table>
  </form>
</body>
</html>
