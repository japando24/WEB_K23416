<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title style="font-family: 'Times New Roman', Times, serif;">Chester the Jester</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("hinh/Diamonds.jpg");
            background-repeat: repeat;
        }

        .container {
            width: 400px;
            margin: 20px auto;
            text-align: center;
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0 4px 0;
        }

        .subtitle {
            font-family: 'Times New Roman', Times, serif;
            font-size: 13px;
            margin: 10px 10px 10px 10px;
            font-weight: bold;
        }

        .chester-img {
            border: 3px solid #333;
            display: block;
            margin: 0 auto;
            width: 220px;
        }

        .tagline {
            font-weight: bold;
            font-size: 14px;
            margin: 20px 20px;
        }

        ol {
            text-align: left;
            display: block;
            font-size: 13px;
            width: 280px;
        }

        ol li {
            padding: 6px 0;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chester the Jester</h1>
        <p class="subtitle">Colwn &bull; Juggler &bull; Magician</p>
        <img src="hinh/Chester.jpg" alt="Chester the Jester" class="chester-img">
        <p class="tagline">Here him for your child's party today</p>
        <hr/ style="height: 2px; background-color: blue; border: none;">
        <ol type="I">
            <li>Reasonable rates</li>
            <li>60 minutes, 90 minute programs</li>
            <li>Birthday surprises!</li>
        </ol>
    </div>
</body>
</html>
