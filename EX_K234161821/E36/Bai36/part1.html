<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 36 - Choose a worry</title>
    <style>
        h3 {
            height: 50px;
            width: 100%;
            background: url("hinh/h3.png") no-repeat 0 100%;
            margin: 0;
            padding: 0;
        }
        ul {
            margin: 0;
            padding: 10px 10px 25px 45px;
            background: url("hinh/ul.png") no-repeat 0 100%;
            list-style-image: url("hinh/li.png");
        }
        /* unvisited link */
        a:link {
            color: blue;
        }
        /* visited link */
        a:visited {
            color: blue;
        }
        /* mouse over link */
        a:hover {
            color: red;
            padding-left: 10px;
        }
        /* selected link */
        a:active {
            color: red;
        }
    </style>
</head>
<body>
    <div>
        <h3>Choose a worry</h3>
        <ul>
            <li><a href="#">Future</a></li>
            <li><a href="#">Health</a></li>
            <li><a href="#">Life</a></li>
            <li><a href="#">Money</a></li>
            <li><a href="#">Personal</a></li>
            <li><a href="#">Phobias</a></li>
        </ul>
    </div>
</body>
</html>
