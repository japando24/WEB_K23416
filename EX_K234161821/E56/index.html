<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Xử lý chuỗi</title>
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      margin: 10px;
      background: #fff;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    td {
      padding: 3px 4px;
    }

    fieldset {
      border: 1px solid #888;
      padding: 6px 8px;
    }

    legend {
      font-weight: bold;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 90px;
      resize: vertical;
      font-size: 13px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 5px 0;
      font-size: 13px;
      cursor: pointer;
      background: #f0f0f0;
      border: 1px solid #999;
    }

    button:hover {
      background: #dde;
    }

    .blue  { color: blue; }
    .red   { color: red; }
    .orange { color: darkorange; }
  </style>
</head>
<body>
  <h2>Sử dụng các hàm Xử Lý Chuỗi</h2>

  <table border="1" width="100%" style="margin-bottom:4px;">
    <tr>
      <td width="50%">
        <fieldset>
          <legend>Nhập dữ liệu</legend>
          <textarea id="txtInput"></textarea>
        </fieldset>
      </td>
      <td width="50%">
        <fieldset>
          <legend>Kết quả</legend>
          <textarea id="txtOutput" readonly></textarea>
        </fieldset>
      </td>
    </tr>
  </table>

  <table border="1" width="100%">
    <tr>
      <td width="50%"><button onclick="nhapDuLieu()">Nhập dữ liệu</button></td>
      <td width="50%"><button class="blue" onclick="denKyTuHoa()">Đếm ký tự hoa</button></td>
    </tr>
    <tr>
      <td><button onclick="inChuHoa()">In chữ Hoa</button></td>
      <td><button class="blue" onclick="inMoiTuTrenMoiDong()">In mỗi từ trên mỗi dòng</button></td>
    </tr>
    <tr>
      <td><button class="orange" onclick="inChuThuong()">In chữ thường</button></td>
      <td><button class="blue" onclick="demSoTu()">Đếm số từ</button></td>
    </tr>
    <tr>
      <td><button onclick="demSoKyTuThuong()">Đếm số ký tự thường</button></td>
      <td><button class="blue" onclick="inNguyenAmPhuAm()">In Nguyên âm, phụ âm</button></td>
    </tr>
    <tr>
      <td colspan="2"><button onclick="xemWebsite()">Xem Website xử lý chuỗi w3c</button></td>
    </tr>
  </table>

  <script>
    // Bộ nguyên âm tiếng Việt (chữ thường)
    var NGUYEN_AM = 'aăâeêioôơuưy'
      + 'àáảãạăắằẳẵặâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵ';

    function layInput() {
      return document.getElementById('txtInput').value;
    }

    function hienThiKetQua(val) {
      document.getElementById('txtOutput').value = val;
    }

    // Xóa ô kết quả và đặt con trỏ vào ô nhập
    function nhapDuLieu() {
      document.getElementById('txtInput').value = '';
      document.getElementById('txtOutput').value = '';
      document.getElementById('txtInput').focus();
    }

    // Viết hoa chữ cái đầu mỗi từ (title case) – hỗ trợ tiếng Việt
    function denKyTuHoa() {
      var str = layInput();
      var result = str.replace(/\S+/g, function(word) {
        return word.charAt(0).toUpperCase() + word.slice(1);
      });
      hienThiKetQua(result);
    }

    // Chuyển toàn bộ chuỗi sang chữ HOA
    function inChuHoa() {
      hienThiKetQua(layInput().toUpperCase());
    }

    // In mỗi từ trên một dòng
    function inMoiTuTrenMoiDong() {
      var str = layInput().trim();
      if (str === '') { hienThiKetQua(''); return; }
      var words = str.split(/\s+/);
      hienThiKetQua(words.join('\n'));
    }

    // Chuyển toàn bộ chuỗi sang chữ thường
    function inChuThuong() {
      hienThiKetQua(layInput().toLowerCase());
    }

    // Đếm số từ
    function demSoTu() {
      var str = layInput().trim();
      if (str === '') { hienThiKetQua('Số từ: 0'); return; }
      var count = str.split(/\s+/).length;
      hienThiKetQua('Số từ: ' + count);
    }

    // Đếm số ký tự thường (a-z và chữ thường tiếng Việt)
    function demSoKyTuThuong() {
      var str = layInput();
      var count = 0;
      for (var i = 0; i < str.length; i++) {
        var c = str[i];
        if (c !== c.toUpperCase() && c === c.toLowerCase()) {
          count++;
        }
      }
      hienThiKetQua('Số ký tự thường: ' + count);
    }

    // In danh sách nguyên âm và phụ âm có trong chuỗi
    function inNguyenAmPhuAm() {
      var str = layInput().toLowerCase();
      var nguyenAmList = [];
      var phuAmList = [];

      for (var i = 0; i < str.length; i++) {
        var c = str[i];
        // Chỉ xét ký tự chữ cái
        if (!/\s/.test(c) && c !== c.toUpperCase()) {
          if (NGUYEN_AM.indexOf(c) !== -1) {
            nguyenAmList.push(c);
          } else {
            phuAmList.push(c);
          }
        }
      }

      hienThiKetQua(
        'Nguyên âm (' + nguyenAmList.length + '): ' + nguyenAmList.join(', ') + '\n' +
        'Phụ âm (' + phuAmList.length + '): ' + phuAmList.join(', ')
      );
    }

    // Mở trang W3Schools về String Methods
    function xemWebsite() {
      window.open('https://www.w3schools.com/js/js_string_methods.asp', '_blank');
    }
  </script>
</body>
</html>
